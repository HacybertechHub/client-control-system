<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HACYBERGLOBALTECH™ Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #00111a, #000000 70%);
    color: #fff;
    overflow: hidden;
}

* { transition: 0.25s ease; }

/* LOGIN */
#loginScreen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#loginBox {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border: 1px solid cyan;
    border-radius: 10px;
    box-shadow: 0 0 25px cyan;
    width: 300px;
}

#loginBox input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid cyan;
    background: #000;
    color: cyan;
}

button {
    background: cyan;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* LAYOUT FIXED */
.layout {
    display: none;
    height: 100vh;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: rgba(0,0,0,0.7);
    border-right: 1px solid cyan;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: cyan;
    margin-bottom: 15px;
    cursor: pointer;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.page { display: none; }

.card {
    background: rgba(0,0,0,0.5);
    border: 1px solid cyan;
    padding: 15px;
    margin: 10px 0;
}
</style>

<script>

/* LOGIN */
function login() {
    const pass = document.getElementById("password").value;
    if (pass === "HGT0217") {
        document.getElementById("loginScreen").style.display = "none";
        document.querySelector(".layout").style.display = "flex";
        showPage("dashboard");
    } else {
        alert("Incorrect password");
    }
}

/* FIXED PAGE SYSTEM */
function showPage(page) {
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");
    document.getElementById(page).style.display = "block";

    if (page === "admin") {
        loadAdminTable();
        loadActivationTable();
        loadVerificationTable();
    }
}

/* IDS */
function generateIDs() {
    document.getElementById("genName").value = "HGT-" + Math.floor(Math.random()*99999);
    document.getElementById("botId").value = "BOT-" + Math.floor(Math.random()*99999);
}

/* DB */
function getDB(key){
    return JSON.parse(localStorage.getItem(key) || "[]");
}
function setDB(key, data){
    localStorage.setItem(key, JSON.stringify(data));
}

/* PROCESSING */
function saveRequest(){
    let db = getDB("processingRequests");

    db.push({
        id: Date.now(),
        generatedName: genName.value,
        taxId: taxId.value,
        botId: botId.value,
        paymentMethod: payMethod.value,
        status: "Pending",
        date: new Date().toLocaleString()
    });

    setDB("processingRequests", db);
}

function loadAdminTable(){
    let db = getDB("processingRequests");
    let t = document.getElementById("adminTableBody");
    t.innerHTML = "";

    db.forEach(req=>{
        t.innerHTML += `
        <tr>
        <td>${req.generatedName}</td>
        <td>${req.taxId}</td>
        <td>${req.botId}</td>
        <td>${req.paymentMethod}</td>
        <td>
        <select onchange="updateStatus(${req.id}, this.value)">
        <option ${req.status==="Pending"?"selected":""}>Pending</option>
        <option ${req.status==="Paid"?"selected":""}>Paid</option>
        <option ${req.status==="Approved"?"selected":""}>Approved</option>
        <option ${req.status==="Rejected"?"selected":""}>Rejected</option>
        </select>
        </td>
        <td>${req.date}</td>
        </tr>`;
    });
}

function updateStatus(id,status){
    let db = getDB("processingRequests");
    db = db.map(r=> r.id===id ? {...r,status} : r);
    setDB("processingRequests",db);
    refreshAll();
}

/* ACTIVATION */
function saveActivation(){
    let db = getDB("activationRequests");

    db.push({
        id:Date.now(),
        clientName:activationName.value,
        botOrderId:activationBotId.value,
        platform:activationPlatform.value,
        username:activationUsername.value,
        notes:activationNotes.value,
        status:"Pending",
        date:new Date().toLocaleString()
    });

    setDB("activationRequests",db);
}

function loadActivationTable(){
    let db = getDB("activationRequests");
    let t = activationTableBody;
    t.innerHTML="";

    db.forEach(req=>{
        t.innerHTML += `
        <tr>
        <td>${req.clientName}</td>
        <td>${req.botOrderId}</td>
        <td>${req.platform}</td>
        <td>${req.username}</td>
        <td>${req.notes}</td>
        <td>
        <select onchange="updateActivation(${req.id},this.value)">
        <option ${req.status==="Pending"?"selected":""}>Pending</option>
        <option ${req.status==="Activated"?"selected":""}>Activated</option>
        <option ${req.status==="Rejected"?"selected":""}>Rejected</option>
        </select>
        </td>
        <td>${req.date}</td>
        </tr>`;
    });
}

function updateActivation(id,status){
    let db = getDB("activationRequests");
    db = db.map(r=> r.id===id ? {...r,status} : r);
    setDB("activationRequests",db);
    refreshAll();
}

/* VERIFICATION */
function saveVerification(){
    let db = getDB("verificationRequests");

    db.push({
        id:Date.now(),
        clientName:verificationName.value,
        type:verificationType.value,
        accountId:verificationAccountId.value,
        notes:verificationNotes.value,
        status:"Pending",
        date:new Date().toLocaleString()
    });

    setDB("verificationRequests",db);
}

function loadVerificationTable(){
    let db = getDB("verificationRequests");
    let t = verificationTableBody;
    t.innerHTML="";

    db.forEach(req=>{
        t.innerHTML += `
        <tr>
        <td>${req.clientName}</td>
        <td>${req.type}</td>
        <td>${req.accountId}</td>
        <td>${req.notes}</td>
        <td>
        <select onchange="updateVerification(${req.id},this.value)">
        <option ${req.status==="Pending"?"selected":""}>Pending</option>
        <option ${req.status==="Verified"?"selected":""}>Verified</option>
        <option ${req.status==="Rejected"?"selected":""}>Rejected</option>
        </select>
        </td>
        <td>${req.date}</td>
        </tr>`;
    });
}

function updateVerification(id,status){
    let db = getDB("verificationRequests");
    db = db.map(r=> r.id===id ? {...r,status} : r);
    setDB("verificationRequests",db);
    refreshAll();
}

/* REFRESH ALL */
function refreshAll(){
    loadAdminTable();
    loadActivationTable();
    loadVerificationTable();
}

</script>
</head>

<body onload="generateIDs()">

<!-- LOGIN -->
<div id="loginScreen">
<div id="loginBox">
<h2>LOGIN</h2>
<input type="password" id="password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div class="layout">

<div class="sidebar">
<a onclick="showPage('dashboard')">Home</a>
<a onclick="showPage('processing')">Processing</a>
<a onclick="showPage('activation')">Activation</a>
<a onclick="showPage('verification')">Verification</a>
<a onclick="showPage('admin')">Admin</a>
</div>

<div class="content">

<div id="dashboard" class="page" style="display:block;">
<h1>Dashboard</h1>
</div>

<div id="processing" class="page">
<div class="card">
<input id="genName" readonly>
<input id="taxId">
<input id="botId" readonly>
<select id="payMethod">
<option>PayPal</option>
<option>Zelle</option>
<option>CashApp</option>
</select>
<button onclick="saveRequest()">Submit</button>
</div>
</div>

<div id="activation" class="page">
<div class="card">
<input id="activationName">
<input id="activationBotId">
<input id="activationUsername">
<input id="activationNotes">
<button onclick="saveActivation()">Submit</button>
</div>
</div>

<div id="verification" class="page">
<div class="card">
<input id="verificationName">
<input id="verificationAccountId">
<input id="verificationNotes">
<button onclick="saveVerification()">Submit</button>
</div>
</div>

<div id="admin" class="page">
<h2>Admin</h2>

<button onclick="refreshAll()">Refresh All</button>

<table border="1">
<tbody id="adminTableBody"></tbody>
</table>

<table border="1">
<tbody id="activationTableBody"></tbody>
</table>

<table border="1">
<tbody id="verificationTableBody"></tbody>
</table>

</div>

</div>
</div>

</body>
</html>
